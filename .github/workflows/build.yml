name: Compile Windows Setup Installer
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out main branch
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Project Dependencies
        run: npm install
        working-directory: ${{ github.workspace }}

      - name: Compile setup.exe
        # Fixes the flag to use standard space-separated syntax
        run: npx electron-builder --windows --publish never
        working-directory: ${{ github.workspace }}
        
      - name: Save Installer File
        uses: actions/upload-artifact@v4
        with:
          name: GetTerm-Windows-Installer
          path: ${{ github.workspace }}/dist/*.exe
